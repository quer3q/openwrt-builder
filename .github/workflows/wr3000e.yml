name: WR3000E

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: wr3000e-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout OpenWrt
        uses: actions/checkout@v4
        with:
          repository: openwrt/openwrt
          ref: openwrt-25.12
          fetch-depth: 1

      - name: Free disk space
        uses: jlumbroso/free-disk-space@v1.3.1
        with:
          tool-cache: true
          android: true
          dotnet: true
          haskell: true
          large-packages: true
          docker-images: true
          swap-storage: true

      - name: Show disk usage (before)
        run: df -h

      - name: Install build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential clang flex bison g++ gawk gcc-multilib gettext \
            git libncurses-dev libssl-dev python3 python3-setuptools python3-pyelftools \
            rsync unzip zlib1g-dev file wget curl \
            device-tree-compiler xz-utils
          sudo apt-get clean

      - name: Configure feeds
        run: |
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Generate config
        run: |
          cat > .config <<'EOF'
          # Target Info
          CONFIG_TARGET_mediatek=y
          CONFIG_TARGET_mediatek_filogic=y
          CONFIG_TARGET_mediatek_filogic_DEVICE_cudy_wr3000e-v1=y

          # Interface Requirements
          CONFIG_PACKAGE_luci=y
          EOF

          make defconfig

          echo "===== .config (relevant, enabled only) ====="
          egrep -v '^[[:space:]]*#' .config | egrep "^(CONFIG_TARGET_|CONFIG_PACKAGE_luci=)" || true

      - name: Download sources
        run: |
          make download -j"$(nproc)" || make download -j1 V=s

      - name: Build images
        run: |
          make -j"$(nproc)" || make -j1 V=s

      - name: TAR output
        run: tar -cvf wr3000e-images.tar bin/targets/mediatek/filogic/

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wr3000e-images
          path: wr3000e-images.tar
          if-no-files-found: error
          retention-days: 14

      - name: Show disk usage (after)
        run: df -h

  release:
    name: Make a release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: wr3000e-images

      - name: Extract artifacts
        run: tar xf wr3000e-images.tar

      - name: Get the current date
        run: echo "NOW=$(date +%F)" >> "$GITHUB_ENV"

      - name: Create a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "wr3000e-${{ env.NOW }}"
          name: "WR3000E v25.12"
          prerelease: false
          generate_release_notes: false
          files: bin/targets/mediatek/filogic/*
