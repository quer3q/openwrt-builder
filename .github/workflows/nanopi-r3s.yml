name: NanoPI R3S

on:
  workflow_dispatch: {}
  # schedule:
  #   - cron: "01 15 */20 * *"

permissions:
  contents: write

concurrency:
  group: nanopi-r3s-openwrt-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_VERSION: "25.12.2"
  PROFILE: "friendlyarm_nanopi-r3s"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential file libncurses-dev zlib1g-dev gawk git \
            gettext libssl-dev xsltproc rsync wget unzip python3 zstd
          sudo apt-get clean

      - name: Download Image Builder
        run: |
          wget -q "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/rockchip/armv8/openwrt-imagebuilder-${OPENWRT_VERSION}-rockchip-armv8.Linux-x86_64.tar.zst"
          tar --zstd -xf openwrt-imagebuilder-*.tar.zst
          mv openwrt-imagebuilder-*/ imagebuilder/

      - name: Download Passwall2 packages
        run: |
          API_URL="https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall2/releases/latest"

          PKG_URL=$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("passwall_packages_apk_aarch64_generic")) | .browser_download_url')
          wget -q "$PKG_URL" -O passwall-packages.zip

          LUCI_URL=$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("luci-app-passwall2.*\\.apk$")) | .browser_download_url')
          wget -q -P imagebuilder/packages/ "$LUCI_URL"

          # Extract all .apk files flat into packages/
          unzip -o passwall-packages.zip -d /tmp/passwall-pkgs/
          find /tmp/passwall-pkgs/ -name '*.apk' -exec cp {} imagebuilder/packages/ \;

          # Remove stale index so make image regenerates it with all packages
          rm -f imagebuilder/packages/packages.adb

      - name: Configure partition sizes
        run: |
          cd imagebuilder
          sed -i 's/CONFIG_TARGET_KERNEL_PARTSIZE=.*/CONFIG_TARGET_KERNEL_PARTSIZE=32/' .config
          sed -i 's/CONFIG_TARGET_ROOTFS_PARTSIZE=.*/CONFIG_TARGET_ROOTFS_PARTSIZE=512/' .config

      - name: Build image
        run: |
          cd imagebuilder
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES=" \
              -dnsmasq dnsmasq-full \
              luci \
              luci-app-passwall2 xray-core \
              kmod-nft-queue kmod-nft-nat kmod-nft-offload \
              adguardhome \
              parted losetup resize2fs \
            "

      - name: TAR output
        run: tar -cvf nanopi-r3s-images.tar imagebuilder/bin/targets/rockchip/armv8

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: nanopi-r3s-images
          path: nanopi-r3s-images.tar
          if-no-files-found: error
          retention-days: 14

  release:
    name: Make a release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: nanopi-r3s-images

      - name: Extract artifacts
        run: tar xf nanopi-r3s-images.tar

      - name: Get the current date
        run: echo "NOW=$(date +%F)" >> "$GITHUB_ENV"

      - name: Create a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "r3s-${{ env.NOW }}"
          name: "NanoPI R3S v${{ env.OPENWRT_VERSION }}"
          prerelease: false
          files: imagebuilder/bin/targets/rockchip/armv8/*
          generate_release_notes: false
