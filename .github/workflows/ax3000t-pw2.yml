name: AX3000T (PW2)

on:
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: ax3000t-pw2-${{ github.ref }}
  cancel-in-progress: true

env:
  OPENWRT_VERSION: "25.12.2"
  PROFILE: "xiaomi_mi-router-ax3000t"

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            build-essential file libncurses-dev zlib1g-dev gawk git \
            gettext libssl-dev xsltproc rsync wget unzip python3 zstd
          sudo apt-get clean

      - name: Download Image Builder
        run: |
          wget -q "https://downloads.openwrt.org/releases/${OPENWRT_VERSION}/targets/mediatek/filogic/openwrt-imagebuilder-${OPENWRT_VERSION}-mediatek-filogic.Linux-x86_64.tar.zst"
          tar --zstd -xf openwrt-imagebuilder-*.tar.zst
          mv openwrt-imagebuilder-*/ imagebuilder/

      - name: Download Passwall2 packages
        run: |
          API_URL="https://api.github.com/repos/Openwrt-Passwall/openwrt-passwall2/releases/latest"

          PKG_URL=$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("passwall_packages_apk_aarch64_cortex-a53")) | .browser_download_url')
          wget -q "$PKG_URL" -O passwall-packages.zip

          LUCI_URL=$(curl -s "$API_URL" | jq -r '.assets[] | select(.name | test("luci-app-passwall2.*\\.apk$")) | .browser_download_url')
          wget -q -P imagebuilder/packages/ "$LUCI_URL"

          # Extract all .apk files flat into packages/
          unzip -o passwall-packages.zip -d /tmp/passwall-pkgs/
          find /tmp/passwall-pkgs/ -name '*.apk' -exec cp {} imagebuilder/packages/ \;

          # Remove stale index so make image regenerates it with all packages
          rm -f imagebuilder/packages/packages.adb

      - name: Build image
        run: |
          cd imagebuilder
          make image \
            PROFILE="${PROFILE}" \
            PACKAGES=" \
              -dnsmasq dnsmasq-full \
              luci \
              luci-app-passwall2 xray-core \
              kmod-nft-socket kmod-nft-tproxy \
            "

      - name: TAR output
        run: tar -cvf ax3000t-images.tar imagebuilder/bin/targets/mediatek/filogic

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ax3000t-images
          path: ax3000t-images.tar
          if-no-files-found: error
          retention-days: 14

  release:
    name: Make a release
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: ax3000t-images

      - name: Extract artifacts
        run: tar xf ax3000t-images.tar

      - name: Get the current date
        run: echo "NOW=$(date +%F)" >> "$GITHUB_ENV"

      - name: Create a release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: "ax3000t-pw2-${{ env.NOW }}"
          name: "AX3000T v${{ env.OPENWRT_VERSION }} (PW2)"
          prerelease: false
          files: imagebuilder/bin/targets/mediatek/filogic/*
          generate_release_notes: false
